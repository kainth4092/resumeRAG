services:
  - type: web
    name: resu-pilot-ai-backend
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    plan: starter
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: 60
      - key: OPENROUTER_API_KEY
        sync: false
      - key: OPENROUTER_BASE_URL
        value: https://openrouter.ai/api/v1
      - key: OPENROUTER_MODEL
        value: google/gemma-4-31b-it:free
      - key: QDRANT_URL
        sync: false
      - key: QDRANT_API_KEY
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM_ADDRESS
        value: onboarding@resend.dev
      - key: FRONTEND_URL
        sync: false
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: false
      - key: UPLOAD_DIR
        value: uploads/tmp
      - key: MAX_FILE_SIZE
        value: 5242880
      - key: OLLAMA_BASE_URL
        sync: false
      - key: OLLAMA_MODEL
        value: gemma3:4b
      - key: WHISPER_MODEL_SIZE
        value: small
      - key: WHISPER_DEVICE
        value: cpu
      - key: WHISPER_COMPUTE_TYPE
        value: int8
      - key: RAPIDAPI_KEY
        sync: false
      - key: RAPIDAPI_HOST
        value: jsearch.p.rapidapi.com

  - type: static
    name: resu-pilot-ai-frontend
    rootDir: frontend
    buildCommand: npm install && npm run build
    publishPath: dist
    envVars:
      - key: VITE_API_URL
        sync: false
      - key: VITE_APP_NAME
        value: ResuPilot AI
      - key: VITE_ENVIRONMENT
        value: production
